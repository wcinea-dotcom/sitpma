<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas des Plantes d'Haïti - Accueil</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e4028, #2c5e3b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
        }
        h1 { color: #c5a059; font-size: 3rem; margin-bottom: 20px; }
        .language-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px 0;
        }
        .lang-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            color: #2c5e3b;
            transition: 0.3s;
        }
        .lang-card:hover {
            transform: translateY(-5px);
            background: #c5a059;
            color: #1e4028;
        }
        .lang-flag { font-size: 3rem; display: block; }
        .lang-name { font-size: 1.5rem; font-weight: bold; }
        @media (max-width: 600px) {
            .language-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌿 Atlas des Plantes du Grand Sud d'Haïti</h1>
        <p>Documentation, conservation et valorisation de la biodiversité</p>
        
        <div class="language-grid">
            <a href="/fr/" class="lang-card">
                <span class="lang-flag">🇫🇷</span>
                <span class="lang-name">Français</span>
            </a>
            <a href="/en/" class="lang-card">
                <span class="lang-flag">🇬🇧</span>
                <span class="lang-name">English</span>
            </a>
            <a href="/ht/" class="lang-card">
                <span class="lang-flag">🇭🇹</span>
                <span class="lang-name">Kreyòl</span>
            </a>
        </div>
    </div>
</body>
</html>
