<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'fr' }}" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    
    <meta name="description" content="{{ page.description | default: site.description }}">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    
    <!-- SEO -->
    <link rel="alternate" hreflang="fr" href="{{ '/fr/' | absolute_url }}">
    <link rel="alternate" hreflang="en" href="{{ '/en/' | absolute_url }}">
    <link rel="alternate" hreflang="ht" href="{{ '/ht/' | absolute_url }}">
    
    {% seo %}
</head>
<body class="bg-gray-50 text-gray-800 antialiased flex flex-col min-h-screen" data-lang="{{ page.lang | default: 'fr' }}">

    {% include header.html %}

    <main class="flex-grow">
        {{ content }}
    </main>

    {% include footer.html %}

    <!-- JavaScript -->
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
    {% if page.js %}<script src="{{ page.js | relative_url }}"></script>{% endif %}
</body>
</html>
