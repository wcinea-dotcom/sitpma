<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page non trouvée</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e4028 0%, #2c5e3b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 600px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        h1 {
            font-size: 6rem;
            margin: 0;
            color: #c5a059;
            line-height: 1;
        }
        
        h2 {
            font-size: 2rem;
            margin: 0 0 20px 0;
        }
        
        .leaf {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: #c5a059;
            color: #1e4028;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-3px);
        }
        
        .links {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        
        .links a {
            color: white;
            text-decoration: none;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
        }
        
        .links a:hover {
            background: #c5a059;
            color: #1e4028;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="leaf">🌿</div>
        <h1>404</h1>
        <h2>Page non trouvée</h2>
        <p>La page que vous recherchez n'existe pas ou a été déplacée.</p>
        
        <a href="/" class="btn">🏠 Retour à l'accueil</a>
        
        <div class="links">
            <a href="/fr/">🇫🇷 FR</a>
            <a href="/en/">🇬🇧 EN</a>
            <a href="/ht/">🇭🇹 HT</a>
        </div>
    </div>
</body>
</html>
