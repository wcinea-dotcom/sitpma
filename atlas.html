<!-- Hero -->
<section style="background: linear-gradient(135deg, #1e4028 0%, #2c5e3b 100%); color: white; padding: 60px 20px; text-align: center;">
  <div style="max-width: 900px; margin: 0 auto;">
    <span style="display: inline-block; background: #c5a059; color: #1e4028; padding: 6px 20px; border-radius: 50px; font-size: 14px; font-weight: 700; margin-bottom: 20px;">
      <i class="fa-solid fa-leaf" style="margin-right: 6px;"></i>
      <span data-fr="270 Plantes Documentées" data-en="270 Documented Plants" data-kr="270 Plant Dokimante">270 Plantes Documentées</span>
    </span>
    <h1 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 12px;"
        data-fr="Base de données des Plantes" data-en="Plant Database" data-kr="Baz Done Plant yo">Base de données des Plantes</h1>
    <p style="font-size: 1.1rem; opacity: 0.9; max-width: 700px; margin: 0 auto;"
       data-fr="Explorez la richesse de la flore médicinale, aromatique et nutritionnelle du Grand Sud."

          class="bg-[#e8f5e9] text-[#2c5e3b] px-4 py-2 rounded-full text-sm font-bold" style="border: 1px solid #2c5e3b;">0</span>
  </div>

  <div id="resultatsGrid"
       class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 min-h-[400px]">
    <div class="col-span-full flex items-center justify-center py-16 text-gray-400">
      <i class="fa-solid fa-circle-notch fa-spin text-3xl mr-3"></i>
      <span>Chargement des 270 plantes...</span>
    </div>
  </div>
</section>

<!-- Modal détail plante -->
<div id="plantModal"
     class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm">
  <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto relative shadow-2xl">
    <button onclick="closeModal()"
            class="absolute top-4 right-4 bg-white hover:bg-gray-100 rounded-full w-10 h-10 flex items-center justify-center shadow">
      <i class="fas fa-times"></i>
    </button>
    <div id="modalContent" class="p-6"></div>
  </div>
</div>

<div id="footer-placeholder"></div>

<!-- Scripts -->
<script src="pmaa-nav.js?v=20260412"></script>
<script src="assets/js/plantes-data.js?v=20260412"></script>
<script src="assets/js/main.js?v=20260412"></script>
<script>
  // Initialiser la navigation PMAA
  PMAA.renderNav('atlas');
  PMAA.renderFooter();

  // Appliquer la langue sauvegardée
  try {
    const saved = sessionStorage.getItem('pmaa_lang');
    if (saved && saved !== 'fr') PMAA.setLang(saved);
  } catch(e) {}

  // Exposer les fonctions globalement
  window.showPlantDetails = showPlantDetails;
  window.closeModal = closeModal;
  window.resetFilters = resetFilters;

  // Si on arrive depuis la recherche globale
  const urlParams = new URLSearchParams(window.location.search);
  const q = urlParams.get('q');
  if (q) {
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.value = q;
      setTimeout(() => applyFilters(), 500);
    }
  }
</script>
</body>
</html>
