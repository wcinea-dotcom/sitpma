
{% assign lang = page.lang | default: 'fr' %}
{% assign base = '/' | append: lang %}

<div class="search-section bg-white p-6 rounded-xl shadow-md max-w-4xl mx-auto my-8">
  
  <form action="{{ base | append: '/recherche/' | relative_url }}" 
        method="get" 
        class="flex flex-col md:flex-row gap-4">

    <!-- Champ recherche -->
    <input type="text"
           name="q"
           aria-label="Search"
           placeholder="{{ site.data.translations[lang].search.placeholder | default: 'Rechercher une plante...' }}"
           class="flex-1 px-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-[#2c5e3b] focus:border-[#2c5e3b] outline-none">

    <!-- Filtre famille -->
    <select name="famille"
            aria-label="Famille"
            class="px-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-[#2c5e3b] outline-none">
      <option value="">
        {{ site.data.translations[lang].search.all_families | default: 'Toutes les familles' }}
      </option>
    </select>

    <!-- Bouton -->
    <button type="submit"
            class="bg-[#2c5e3b] text-white px-6 py-3 rounded-lg font-bold hover:bg-[#1e4028] transition">
      {{ site.data.translations[lang].search.button | default: 'Rechercher' }}
    </button>

  </form>
</div>
