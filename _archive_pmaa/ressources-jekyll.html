    </span>
    <h1 class="text-3xl md:text-5xl font-black mb-4" data-i18n="res_hub_title">Base de Données des Ressources</h1>

<section class="bg-gray-50 py-16 px-4 flex-grow">
  <div class="max-w-7xl mx-auto">
    
    <div class="bg-white p-6 rounded-2xl shadow-lg flex flex-col md:flex-row gap-4 items-center max-w-4xl mx-auto mb-12 border border-gray-100">
      <div class="relative w-full md:w-2/3">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="text" id="searchResInput"

               data-i18n-placeholder="res_search_ph" placeholder="Rechercher une ressource...">

      <select id="filterResType" class="w-full md:w-1/3 py-3 px-4 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-[#c5a059] focus:border-[#c5a059] outline-none bg-white transition">

        <option value="Livre" data-i18n="opt_res_livre">Livres</option>
        <option value="Article" data-i18n="opt_res_article">Articles</option>
        <option value="Vocabulaire" data-i18n="opt_res_vocab">Vocabulaire</option>
