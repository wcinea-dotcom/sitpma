# Configuration principale
title: "Atlas des Plantes du Grand Sud d'Haïti"
email: contact@atlasplantes.ht
description: >-
  Atlas botanique des plantes médicinales, aromatiques et nutritionnelles
  des départements du Sud et de la Grand'Anse d'Haïti.
baseurl: ""
url: "https://atlasplantes.ht"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Collections
collections:
  plantes:
    output: true
    permalink: /:collection/:name/
  familles:
    output: true
    permalink: /:collection/:name/
  systemes:
    output: true
    permalink: /:collection/:name/
  maladies:
    output: true
    permalink: /:collection/:name/
  ressources:
    output: true
    permalink: /:collection/:name/

# Pagination
paginate: 20
paginate_path: "/fr/atlas/plantes/page/:num/"

# Langues
languages:
  - fr
  - en
  - ht

# Defaults par langue
defaults:
  - scope:
      path: "fr"
    values:
      lang: "fr"
      locale: "fr_FR"
  - scope:
      path: "en"
    values:
      lang: "en"
      locale: "en_US"
  - scope:
      path: "ht"
    values:
      lang: "ht"
      locale: "ht_HT"

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore
  - README.md
