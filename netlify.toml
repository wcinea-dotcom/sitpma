[build]
  command = "echo 'No build required'"
  publish = "."

[build.environment]
  HUGO_VERSION = "0.80.0"

# Redirections pour les pages multilingues
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Gestion des erreurs 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Headers de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
